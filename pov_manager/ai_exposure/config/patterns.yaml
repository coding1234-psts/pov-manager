# ------------------------------------------------------------
# CREDENTIAL PATTERNS
# Used by: secrets.py
# Format:
#   name: human-readable label
#   regex: pattern to match
#   confidence: high | medium | low
#   description: shown in report
# ------------------------------------------------------------

credentials:

  # --- AI Provider Keys ---

  - name: OpenAI API Key
    regex: 'sk-[a-zA-Z0-9]{48}'
    confidence: high
    description: >
      An exposed OpenAI API key allows unauthorized use of OpenAI models
      at the organization's expense and may expose conversation data.

  - name: OpenAI Project Key
    regex: 'sk-proj-[a-zA-Z0-9\-_]{80,}'
    confidence: high
    description: >
      An exposed OpenAI project-scoped API key allows unauthorized access
      to a specific OpenAI project and its associated resources.

  - name: Anthropic API Key
    regex: 'sk-ant-[a-zA-Z0-9\-_]{90,}'
    confidence: high
    description: >
      An exposed Anthropic API key allows unauthorized use of Claude models
      at the organization's expense.

  - name: Hugging Face API Token
    regex: 'hf_[a-zA-Z0-9]{34,}'
    confidence: high
    description: >
      An exposed Hugging Face token may allow unauthorized access to private
      models, datasets, or inference endpoints.

  # --- Cloud Provider Keys ---

  - name: AWS Access Key ID
    regex: 'AKIA[0-9A-Z]{16}'
    confidence: high
    description: >
      An exposed AWS Access Key ID, especially combined with a secret key,
      provides broad access to cloud infrastructure and AI services like Bedrock.

  - name: AWS Secret Access Key
    regex: '(?i)aws.{0,20}secret.{0,20}["\s:=]+[A-Za-z0-9/+=]{40}'
    confidence: high
    description: >
      An exposed AWS Secret Access Key paired with an Access Key ID grants
      full programmatic access to AWS services.

  - name: Azure Storage Key or Connection String
    regex: '(?i)(AccountKey=|azure.{0,30}["\s:=]+)[A-Za-z0-9+/]{86}=='
    confidence: high
    description: >
      An exposed Azure storage key or connection string allows unauthorized
      access to Azure Blob Storage, which may contain model artifacts or data.

  - name: Azure Client Secret
    regex: '(?i)(client.?secret|clientsecret).{0,10}["\s:=]+[A-Za-z0-9\-_~.]{32,}'
    confidence: medium
    description: >
      An exposed Azure client secret may allow unauthorized access to Azure
      Active Directory applications and associated resources.

  - name: GCP Service Account Key (JSON fragment)
    regex: '"private_key":\s*"-----BEGIN RSA PRIVATE KEY-----'
    confidence: high
    description: >
      An exposed GCP service account private key grants access to Google Cloud
      services including Vertex AI and Cloud Storage.

  - name: GCP API Key
    regex: 'AIza[0-9A-Za-z\-_]{35}'
    confidence: high
    description: >
      An exposed Google API key may grant access to Google Cloud services
      including Vertex AI and other GCP APIs.

  # --- Developer & Platform Tokens ---

  - name: GitHub Personal Access Token (Classic)
    regex: 'ghp_[A-Za-z0-9]{36}'
    confidence: high
    description: >
      An exposed GitHub personal access token may allow access to private
      repositories, including source code and additional secrets.

  - name: GitHub OAuth Token
    regex: 'gho_[A-Za-z0-9]{36}'
    confidence: high
    description: >
      An exposed GitHub OAuth token may allow unauthorized access to
      GitHub resources on behalf of a user.

  - name: GitHub Actions Token
    regex: 'ghs_[A-Za-z0-9]{36}'
    confidence: high
    description: >
      An exposed GitHub Actions token may allow unauthorized access to
      CI/CD pipelines and associated secrets.

  - name: Slack Bot Token
    regex: 'xoxb-[0-9]{10,12}-[0-9]{10,12}-[a-zA-Z0-9]{24}'
    confidence: high
    description: >
      An exposed Slack bot token allows unauthorized access to Slack
      workspaces, channels, and messages.

  - name: Slack User Token
    regex: 'xoxp-[0-9]{10,12}-[0-9]{10,12}-[0-9]{10,12}-[a-zA-Z0-9]{32}'
    confidence: high
    description: >
      An exposed Slack user token allows impersonation of a real user
      within a Slack workspace.

  - name: Stripe Live Secret Key
    regex: 'sk_live_[0-9a-zA-Z]{24,}'
    confidence: high
    description: >
      An exposed Stripe live secret key allows unauthorized financial
      transactions and access to customer payment data.

  - name: Stripe Restricted Key
    regex: 'rk_live_[0-9a-zA-Z]{24,}'
    confidence: high
    description: >
      An exposed Stripe restricted key may allow access to specific
      Stripe resources depending on configured permissions.

  # --- Generic High-Entropy Detection ---
  # These use contextual variable name matching + entropy heuristic in secrets.py
  # The regex here matches the surrounding context; entropy is checked in code

  - name: Generic Secret in Variable Assignment
    regex: '(?i)(api_key|apikey|api_secret|secret_key|access_token|auth_token|private_key|bearer)\s*[=:]\s*["\x27]([A-Za-z0-9\-_./+=]{20,})["\x27]'
    confidence: medium
    description: >
      A variable name strongly associated with credentials contains a
      moderately high-entropy string. Manual verification recommended.

  - name: Bearer Token in Source
    regex: '(?i)bearer\s+[A-Za-z0-9\-_.+/=]{20,}'
    confidence: medium
    description: >
      A hardcoded bearer token was found in a public asset. This may
      allow unauthorized API access if the token is still valid.


# ------------------------------------------------------------
# AI SDK & SERVICE FINGERPRINTS
# Used by: analyzer.py
# Scanned in: HTML source, JS bundles, source maps
# ------------------------------------------------------------

ai_fingerprints:

  - name: OpenAI SDK
    # strong_patterns: at least one must match for the finding to be reported.
    # These indicate actual SDK usage, not just a name reference in a UI bundle.
    strong_patterns:
      - 'require\s*\(\s*["'']openai["'']\s*\)'
      - 'from\s+["'']openai["'']'
      - 'new\s+OpenAI\s*\('
      - 'openai\.chat\.completions'
      - 'openai\.embeddings'
      - 'openai\.images'
      - 'api\.openai\.com'
      - 'OPENAI_API_KEY\s*[=:]'
    patterns:
      - 'openai'
      - 'from openai import'
      - 'require.*openai'
      - 'chat/completions'
      - 'gpt-4'
      - 'gpt-3\.5'
    confidence: high
    description: OpenAI SDK or API reference detected in public assets.

  - name: Anthropic SDK
    strong_patterns:
      - 'require\s*\(\s*["'']@anthropic-ai[/"'']'
      - 'from\s+["'']@anthropic-ai'
      - 'new\s+Anthropic\s*\('
      - 'anthropic\.messages\.create'
      - 'anthropic\.completions'
      - 'api\.anthropic\.com'
      - 'ANTHROPIC_API_KEY\s*[=:]'
    patterns:
      - 'anthropic'
      - 'from anthropic import'
      - 'require.*anthropic'
      - 'claude-3'
      - 'claude-2'
    confidence: high
    description: Anthropic SDK or API reference detected in public assets.

  - name: Azure OpenAI
    strong_patterns:
      - 'openai\.azure\.com'
      - 'cognitiveservices\.azure\.com'
      - 'new\s+AzureOpenAI\s*\('
      - 'AzureOpenAI\s*\('
      - 'AZURE_OPENAI_API_KEY\s*[=:]'
    patterns:
      - 'azure.*openai'
      - 'openai.*azure'
      - 'AzureOpenAI'
    confidence: high
    description: Azure OpenAI Service reference detected in public assets.

  - name: AWS Bedrock
    strong_patterns:
      - 'bedrock-runtime'
      - 'amazonaws\.com.*bedrock'
      - 'bedrock\.invoke_model'
      - 'bedrock\.converse'
      - 'AWS_BEDROCK'
    patterns:
      - 'bedrock'
      - 'boto3.*bedrock'
      - 'aws.*bedrock'
    confidence: high
    description: AWS Bedrock reference detected in public assets.

  - name: Google Vertex AI
    strong_patterns:
      - 'us-central1-aiplatform\.googleapis\.com'
      - 'aiplatform\.googleapis\.com'
      - 'new\s+VertexAI\s*\('
      - 'from\s+["'']@google-cloud/vertexai'
      - 'require\s*\(\s*["'']@google-cloud/vertexai'
      - 'GOOGLE_VERTEX_AI'
      - 'GEMINI_API_KEY\s*[=:]'
    patterns:
      - 'vertexai'
      - 'vertex_ai'
      - 'aiplatform'
      - 'google.*generativeai'
      - 'gemini-pro'
      - 'gemini-1\.'
    confidence: high
    description: Google Vertex AI or Gemini API reference detected in public assets.

  - name: Hugging Face
    strong_patterns:
      - 'api-inference\.huggingface\.co'
      - 'huggingface\.co/api'
      - 'from\s+["'']@huggingface'
      - 'require\s*\(\s*["'']@huggingface'
      - 'HuggingFaceInference\s*\('
      - 'InferenceClient\s*\('
      - 'HUGGING_FACE_API_KEY\s*[=:]'
      - 'HF_TOKEN\s*[=:]'
    patterns:
      - 'huggingface'
      - 'hugging.face'
      - 'api-inference\.huggingface\.co'
      - 'hf\.co'
    confidence: high
    description: Hugging Face API or SDK reference detected in public assets.

  - name: LangChain
    strong_patterns:
      - 'require\s*\(\s*["'']langchain'
      - 'from\s+["'']langchain[/"'']'
      - 'from\s+["'']@langchain'
      - 'require\s*\(\s*["'']@langchain'
      - 'new\s+ChatOpenAI\s*\('
      - 'new\s+ChatAnthropic\s*\('
      - 'LLMChain\s*\('
      - 'AgentExecutor\s*\('
    patterns:
      - 'langchain'
      - 'from langchain'
      - 'require.*langchain'
      - 'LangChain'
    confidence: high
    description: LangChain framework reference detected. Often indicates complex LLM pipeline usage.

  - name: LlamaIndex
    strong_patterns:
      - 'from\s+["'']llama.index'
      - 'require\s*\(\s*["'']llama.index'
      - 'GPTSimpleVectorIndex\s*\('
      - 'VectorStoreIndex\s*\('
      - 'SimpleDirectoryReader\s*\('
    patterns:
      - 'llama.index'
      - 'llama_index'
      - 'from llama_index'
      - 'GPTSimpleVectorIndex'
    confidence: high
    description: LlamaIndex (formerly GPT Index) reference detected. Indicates RAG or document QA pipeline.

  - name: Cohere
    strong_patterns:
      - 'api\.cohere\.ai'
      - 'cohere\.Client\s*\('
      - 'cohere\.generate'
      - 'cohere\.embed'
      - 'COHERE_API_KEY\s*[=:]'
    patterns:
      - 'cohere'
      - 'api\.cohere\.ai'
      - 'cohere\.Client'
    confidence: medium
    description: Cohere API reference detected in public assets.

  - name: Mistral AI
    strong_patterns:
      - 'api\.mistral\.ai'
      - 'new\s+MistralClient\s*\('
      - 'mistralai\.Mistral\s*\('
      - 'MISTRAL_API_KEY\s*[=:]'
    patterns:
      - 'mistral'
      - 'api\.mistral\.ai'
      - 'mistralai'
    confidence: medium
    description: Mistral AI API reference detected in public assets.

  - name: Replicate
    strong_patterns:
      - 'api\.replicate\.com'
      - 'replicate\.run\s*\('
      - 'new\s+Replicate\s*\('
      - 'REPLICATE_API_TOKEN\s*[=:]'
    patterns:
      - 'replicate'
      - 'api\.replicate\.com'
      - 'replicate\.run'
    confidence: medium
    description: Replicate API reference detected. May indicate hosted model usage.


