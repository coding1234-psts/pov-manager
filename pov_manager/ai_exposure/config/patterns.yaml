# ------------------------------------------------------------
# VULNERABILITY SIGNAL PATTERNS
# Used by: analyzer.py
# Detects risky deployment patterns (non-exploitative)
# ------------------------------------------------------------

vulnerability_signals:

  missing_auth_indicators:
    description: >
      AI endpoints that respond with 200 OK and no WWW-Authenticate header,
      no redirect to login, and no API key requirement in response body.
    response_codes_of_concern: [200]
    absence_of_headers:
      - 'WWW-Authenticate'
      - 'X-API-Key'
    absence_of_body_patterns:
      - 'unauthorized'
      - 'authentication required'
      - 'api key required'
      - 'please login'

  missing_rate_limit_headers:
    description: >
      AI endpoints with no rate limiting signals are vulnerable to abuse
      and cost exhaustion attacks.
    absence_of_headers:
      - 'X-RateLimit-Limit'
      - 'X-RateLimit-Remaining'
      - 'Retry-After'
      - 'X-Rate-Limit'

  open_api_docs:
    description: >
      Publicly accessible API documentation may expose internal AI route
      structures, model names, and parameter schemas to attackers.
    response_body_patterns:
      - 'swagger-ui'
      - 'openapi'
      - 'redoc'
      - '"paths":'
      - '"info":'
      - '"components":'

  exposed_source_maps:
    description: >
      JavaScript source maps expose original unminified source code,
      which may contain API keys, internal logic, or endpoint structures.
    file_extensions:
      - '.js.map'
      - '.ts.map'
    header_pattern: 'X-SourceMap'
    inline_pattern: '//# sourceMappingURL='

  missing_csrf:
    description: >
      Forms that post to AI endpoints without CSRF tokens are vulnerable
      to cross-site request forgery attacks.
    absence_of_input_patterns:
      - 'csrf'
      - '_token'
      - 'xsrf'

  open_storage_buckets:
    description: >
      Publicly accessible cloud storage may contain model artifacts,
      training data, or other sensitive AI assets.
    url_patterns:
      - '\.s3\.amazonaws\.com'
      - '\.s3\.[a-z0-9\-]+\.amazonaws\.com'
      - 'storage\.googleapis\.com'
      - '\.blob\.core\.windows\.net'
      - 'r2\.cloudflarestorage\.com'


# ------------------------------------------------------------
# SCORING WEIGHTS
# Used by: scorer.py
# Adjust values here to tune risk thresholds.
# ------------------------------------------------------------

scoring:

  weights:
    exposed_ai_key_high: 50
    exposed_cloud_key_high: 40
    exposed_key_medium: 25
    exposed_key_low: 10
    public_ai_endpoint_no_auth: 60
    open_api_docs_ai_routes: 30
    open_storage_bucket: 45
    source_map_exposed: 20
    ai_sdk_in_public_bundle: 10
    chatbot_detected_no_validation: 15
    no_rate_limiting_on_ai_endpoint: 10
    missing_csrf_on_ai_form: 10
    mcp_exposed: 25
    prompt_leakage: 20
    vector_exposed: 20
    embedding_exposed: 15
    agent_framework_exposed: 20
    plugin_manifest_exposed: 15
    trace_log_exposed: 20
    inference_api_exposed: 25
    admin_playground_exposed: 20

  thresholds:
    low:
      min: 0
      max: 25
      label: Low
      color: green
      hex: '#2d7a2d'
      summary_template: >
        {target} shows limited AI-related public exposure at this time.
        {finding_count} signals were identified, none of which represent
        immediate critical risk. Continued monitoring is recommended as
        AI adoption expands.

    moderate:
      min: 26
      max: 75
      label: Moderate
      color: amber
      hex: '#b35c00'
      summary_template: >
        {target} presents a moderate AI attack surface with a risk score
        of {score}. {finding_count} findings were identified including
        {top_findings}. These exposures represent meaningful risk that
        should be addressed before they can be exploited by a threat actor.

    high:
      min: 76
      max: 9999
      label: High
      color: red
      hex: '#b30000'
      summary_template: >
        {target} presents a high AI attack surface risk with a score of
        {score}. {finding_count} findings were identified including
        {top_findings}. Immediate remediation is recommended. These
        exposures create material risk of unauthorized AI access, data
        exfiltration, and significant financial liability.


# ------------------------------------------------------------
# REMEDIATION GUIDANCE
# Used by: reporter.py
# Keyed to finding types. Shown in report remediation section.
# ------------------------------------------------------------

remediation:

  exposed_ai_key:
    title: Rotate Exposed AI API Keys Immediately
    priority: Critical
    steps:
      - Rotate the exposed key immediately via the provider's dashboard (OpenAI, Anthropic, etc.)
      - Audit usage logs for the exposed key to identify any unauthorized usage
      - Remove the key from all public-facing assets (JS bundles, HTML, config files)
      - Store API keys in environment variables or a secrets manager (e.g. AWS Secrets Manager, HashiCorp Vault)
      - Add pre-commit hooks or CI checks to prevent secrets from being committed

  exposed_cloud_key:
    title: Rotate Exposed Cloud Credentials and Audit Access
    priority: Critical
    steps:
      - Immediately rotate or revoke the exposed cloud key via the provider console
      - Review CloudTrail / audit logs for unauthorized API calls using the exposed key
      - Apply least-privilege IAM policies to all service accounts
      - Enforce secrets management policies across all development teams
      - Consider enabling AWS GuardDuty or equivalent anomaly detection

  public_ai_endpoint_no_auth:
    title: Restrict Access to AI Endpoints
    priority: High
    steps:
      - Require API key or OAuth token authentication on all AI endpoints
      - Return 401 Unauthorized for unauthenticated requests
      - Consider IP allowlisting for internal-only AI endpoints
      - Implement rate limiting to prevent abuse and cost exhaustion

  open_api_docs:
    title: Restrict Access to API Documentation
    priority: Medium
    steps:
      - Move Swagger/OpenAPI documentation behind authentication
      - Consider disabling API docs entirely in production environments
      - Ensure API docs do not expose internal model names or infrastructure details

  source_map_exposed:
    title: Disable Source Map Exposure in Production
    priority: Medium
    steps:
      - Configure your build tool to exclude source maps from production builds
      - If source maps are needed for error tracking, use a private source map service
      - Audit existing deployed assets and remove any accessible .map files

  open_storage_bucket:
    title: Restrict Public Access to Cloud Storage
    priority: High
    steps:
      - Set storage bucket/blob access policy to private
      - Enable Block Public Access settings on all S3 buckets
      - Audit bucket contents for sensitive model artifacts or training data
      - Use signed URLs for any assets that require temporary public access

  missing_rate_limiting:
    title: Implement Rate Limiting on AI Endpoints
    priority: Medium
    steps:
      - Implement rate limiting at the API gateway or application layer
      - Set appropriate limits per IP and per API key
      - Return 429 Too Many Requests with Retry-After header when limits are exceeded
      - Monitor for unusual usage spikes that may indicate abuse

  chatbot_no_validation:
    title: Add Input Validation to AI-Powered Forms and Chatbots
    priority: Medium
    steps:
      - Implement server-side input validation and sanitization
      - Add CSRF protection to all forms that submit to AI endpoints
      - Consider implementing a system prompt that resists prompt injection
      - Add output filtering to prevent sensitive data leakage in AI responses

  mcp_exposed:
    title: Restrict Public MCP Exposure
    priority: High
    steps:
      - Ensure MCP endpoints, manifests, and tool schemas are not publicly exposed without authentication
      - Remove or protect admin and debug routes related to MCP servers
      - Avoid exposing tool capability lists to unauthenticated internet users
      - Review whether MCP should be reachable externally at all

  prompt_leakage:
    title: Remove Prompt and Instruction Leakage from Public Assets
    priority: High
    steps:
      - Remove system prompts, instruction templates, and guardrail text from public JS bundles and config files
      - Avoid embedding assistant prompts in client-side code where possible
      - Disable source maps in production if they expose internal prompt logic
      - Audit prompt templates and agent configuration artifacts for accidental publication

  vector_exposed:
    title: Restrict Public Vector Database Exposure
    priority: High
    steps:
      - Ensure vector database APIs, admin surfaces, and collection metadata are not publicly exposed
      - Restrict access to vector infrastructure by network and authentication controls
      - Review OpenAPI/docs exposure for retrieval and vector management routes
      - Audit public bundles for leaked vector service configuration and credentials

  embedding_exposed:
    title: Restrict Public Embedding and Retrieval Endpoints
    priority: Medium
    steps:
      - Require authentication and rate limiting on embedding or retrieval endpoints
      - Avoid exposing semantic-search or retrieval APIs publicly unless intentionally designed for that use
      - Review whether embedding endpoints leak model or architecture information to unauthenticated users

  agent_framework_exposed:
    title: Review Public Agent Framework Exposure
    priority: Medium
    steps:
      - Ensure public bundles and config files do not unnecessarily reveal agent orchestration frameworks
      - Review whether public references expose architectural details useful to attackers
      - Minimize leakage of agent workflow primitives, tool wiring, and orchestration patterns in client-side assets

  plugin_manifest_exposed:
    title: Restrict Public AI Plugin and Manifest Exposure
    priority: Medium
    steps:
      - Review whether public plugin or assistant manifests are intentionally exposed
      - Minimize capability details exposed through manifests where possible
      - Ensure associated API surfaces are authenticated and rate-limited

  trace_log_exposed:
    title: Remove Public AI Trace, Eval, and Transcript Exposure
    priority: High
    steps:
      - Remove prompt logs, traces, eval artifacts, and transcript data from public-facing assets
      - Restrict access to observability and evaluation tooling
      - Audit static assets and docs for leaked conversation or prompt content

  inference_api_exposed:
    title: Restrict Public Inference and Model API Exposure
    priority: High
    steps:
      - Require authentication on model-serving and inference APIs
      - Restrict public access to `/v1/models`, chat/completions, embeddings, and similar model routes
      - Add rate limiting and abuse controls to externally reachable inference surfaces
      - Review whether public model metadata or playground-style interfaces are unintentionally exposed

  admin_playground_exposed:
    title: Restrict Public AI Playground and Debug Surfaces
    priority: High
    steps:
      - Remove or authenticate AI playgrounds, prompt consoles, debug panels, and model explorers
      - Avoid exposing internal testing or demo surfaces to the public internet
      - Review whether public AI admin or evaluation interfaces leak architectural or operational details


# ------------------------------------------------------------
# SCANNER BEHAVIOUR SETTINGS
# Used by: collector.py, cli.py
# ------------------------------------------------------------

scanner:
  request_timeout_seconds: 10
  delay_between_requests_seconds: 0.5
  max_js_bundle_size_mb: 10
  max_redirects: 3
  user_agent: 'AIExposureAnalyzer/1.0 (Security Assessment Scanner; non-invasive)'
  respect_robots_txt: true
  follow_cross_domain_redirects: false
