{% extends 'base.html' %}
{% load static %}
{% block content %}
    <div class="container mt-5">
        <h1 class="mb-4">Category list</h1>

        <div class="row justify-content-end">
            <div class="col-2">
                <a href="{% url 'category_create' %}" class="btn btn-primary float-end">Add category</a>
            </div>
        </div>

        <div class="row mt-5">
            {% for category in object_list %}
                <div class="col-mb-4 mb-4">
                    <div class="card">
                        <div class="card-body">
                            <h6 class="card-title">{{ category.name }}</h6>
                            <a href="{% url 'category_edit' category.pk %}" class="btn btn-primay btn-sm mr-2">Edit</a>
                            <a href="{% url 'category_delete' category.pk %}" class="btn btn-danger btn-sm">Delete</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>

    </div>
{% endblock %}
