{% extends 'base.html' %}
{% load static %}
{% block content %}
    <h1>Are you sure you want to delete "{{ object.query }}"?</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm</button>
    </form>
    <a href="{% url 'category_list' %}">Cancel</a>
{% endblock %}
