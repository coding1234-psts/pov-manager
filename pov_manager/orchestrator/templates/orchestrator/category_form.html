{% extends 'base.html' %}
{% load static %}
<!--{% load bootstrap5 %}-->
{% block content %}
    <div class="container mt-5">
        <h1>{% if form.instance.pk %}Edit{% else %}Create{% endif %} saved search category</h1>
        <form method="post" action="{% if form.instance.pk %}{% url 'category_edit' pk=form.instance.pk %}{% else %}{% url 'category_create' %}{% endif %}">
            {% csrf_token %}
            {% bootstrap_form form %}
            <button type="submit">{% if form.instance.pk %}Update{% else %}Create{% endif %}</button>
        </form>
        <a href="{% url 'category_list' %}" class="btn btn-primay">Back to list</a>
    </div>
{% endblock %}
