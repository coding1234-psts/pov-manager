services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d
      - ./db_init/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: [ "postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf" ]

  mongo:
    image: mongo:6
    container_name: mongo_db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo_db/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

  django:
    build: .
    container_name: pov_manager
    restart: always
    depends_on:
      - postgres
      - mongo
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DMARC_LAMBDA_FUNCTION_NAME: local-dmarc-not-configured
      DMARC_LAMBDA_REGION: us-east-1
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./ctu-reports:/ctu-reports

volumes:
  postgres_data:
  mongo_data:
